<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #FFF8F0; }
      .hotel { fill: #B45309; }
      .accent { fill: #F59E0B; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #1F2937; }
      .hotel { fill: #FCD34D; }
      .accent { fill: #F59E0B; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  
  <!-- Hotel Building -->
  <g transform="translate(45, 35)">
    <!-- Main building -->
    <rect class="hotel" x="10" y="20" width="70" height="70" rx="4"/>
    
    <!-- Roof -->
    <polygon class="accent" points="10,20 45,0 80,20"/>
    
    <!-- Windows - Row 1 -->
    <rect class="background" x="18" y="28" width="10" height="10" rx="1"/>
    <rect class="background" x="32" y="28" width="10" height="10" rx="1"/>
    <rect class="background" x="46" y="28" width="10" height="10" rx="1"/>
    <rect class="background" x="60" y="28" width="10" height="10" rx="1"/>
    
    <!-- Windows - Row 2 -->
    <rect class="background" x="18" y="44" width="10" height="10" rx="1"/>
    <rect class="background" x="32" y="44" width="10" height="10" rx="1"/>
    <rect class="background" x="46" y="44" width="10" height="10" rx="1"/>
    <rect class="background" x="60" y="44" width="10" height="10" rx="1"/>
    
    <!-- Windows - Row 3 -->
    <rect class="background" x="18" y="60" width="10" height="10" rx="1"/>
    <rect class="background" x="32" y="60" width="10" height="10" rx="1"/>
    <rect class="background" x="46" y="60" width="10" height="10" rx="1"/>
    <rect class="background" x="60" y="60" width="10" height="10" rx="1"/>
    
    <!-- Door -->
    <rect class="background" x="35" y="75" width="20" height="15" rx="2"/>
    <circle class="accent" cx="52" cy="82" r="1.5"/>
  </g>
</svg>
